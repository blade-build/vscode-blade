name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run check-types
      - name: Lint
        run: npm run lint
      - name: Bundle
        run: npm run package
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Test (non-Linux)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies -o vscode-blade.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-blade-vsix
          path: vscode-blade.vsix
