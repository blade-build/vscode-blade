name: Docs

# Build the bilingual MkDocs site (en + zh) and deploy to GitHub Pages at
# https://blade-build.github.io/vscode-blade/ (docs under /docs/en and /docs/zh,
# matching each config's site_url). Self-contained: uses GITHUB_TOKEN, no secrets.
on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install MkDocs
        run: pip install mkdocs-material
      - name: Build en + zh
        working-directory: doc
        run: |
          mkdocs build -f mkdocs-en.yml
          mkdocs build -f mkdocs-zh.yml
      - name: Assemble Pages site
        run: |
          rm -rf _pages
          mkdir -p _pages/docs
          cp -R _site/en _pages/docs/en
          cp -R _site/zh _pages/docs/zh
          cat > _pages/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./docs/en/">
          <title>Blade for VS Code — Documentation</title>
          <a href="./docs/en/">Documentation</a>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
