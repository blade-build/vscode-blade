# 中文文档的 MkDocs 配置（readthedocs 主题），风格参考 Blade 文档。页面标题取自各
# 文件的 H1；仅下方的章节标题在此写明。
site_name: Blade for VS Code
site_description: Blade Visual Studio Code 扩展文档
site_url: https://blade-build.github.io/vscode-blade/docs/zh/
repo_url: https://github.com/blade-build/vscode-blade
repo_name: blade-build/vscode-blade
docs_dir: zh_CN
site_dir: ../_site/zh
use_directory_urls: true

theme:
  name: readthedocs
  highlightjs: true
  language: zh

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code

nav:
  - index.md
  - 快速开始:
      - getting-started.md
  - 用户指南:
      - usage.md
      - build-language.md
      - intellisense.md
      - settings.md
  - 开发文档:
      - development.md
